# Cloudflare Tunnel 配置文件
# 将本地 Flask 应用安全暴露到 Cloudflare 全球网络
# 使用方式: cloudflared tunnel run medical-kb

tunnel: medical-kb
credentials-file: C:\Users\青城\.cloudflared\medical-kb.json

ingress:
  # 主应用 - Flask 临床医学知识库
  - hostname: medical.your-domain.com
    service: http://localhost:5000

  # 所有其他请求返回 404
  - service: http_status:404
